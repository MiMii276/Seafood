services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password    
      MYSQL_DATABASE: seafoodie  
      MYSQL_USER: user                
      MYSQL_PASSWORD: pass 
    ports:          
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - test_demo_network

  php:
    image: php:8.3-fpm
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DEFAULT_URI: http://localhost:8001
      DATABASE_URL: mysql://user:pass@mysql:3306/seafoodie?serverVersion=8.0.32&charset=utf8mb4
    volumes:
      - .:/var/www/html
      - symfony_cache:/var/www/html/var/cache
      - ./docker/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      - mysql
    networks:
      - test_demo_network
    command: bash -c "docker-php-ext-install pdo_mysql mysqli && mkdir -p var/cache var/log && chmod -R 777 var/cache var/log && php-fpm"

  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - .:/app
    networks:
      - test_demo_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - test_demo_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root                 
      PMA_PASSWORD: password       
      PMA_ARBITRARY: 1               
    ports:
      - "8006:80"
    depends_on:
      - mysql
    networks:
      - test_demo_network

volumes:
  mysql_data:
  symfony_cache:

networks:
  test_demo_network:
